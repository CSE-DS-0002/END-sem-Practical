<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMA // Modern Home & Ceramics</title>
    <!-- Elegant, lifestyle-focused fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    
    <style>
        /* Base Styles & Warm Earthy Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #F9F8F6; /* Warm off-white */
            color: #3b3530; /* Dark earthy charcoal */
            overflow-x: hidden; 
            line-height: 1.6;
            font-family: 'Outfit', sans-serif; 
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #d0c8c0; border-radius: 4px; }

        /* Header */
        header {
            position: sticky; top: 0; background: rgba(249, 248, 246, 0.9); 
            backdrop-filter: blur(12px); border-bottom: 1px solid rgba(59, 53, 48, 0.08);
            z-index: 100; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center;
        }
        
        .brand-logo { 
            font-family: 'Playfair Display', serif;
            font-size: 38px; 
            font-weight: 600; 
            letter-spacing: 2px; 
            color: #2c2724;
        }
        
        .header-actions { display: flex; align-items: center; gap: 20px; }
        
        .cart-toggle-btn { 
            background: #4a423b; color: #F9F8F6; border: none; padding: 12px 28px; 
            border-radius: 40px; cursor: pointer; font-weight: 500; font-size: 15px;
            transition: all 0.3s ease; display: flex; align-items: center; gap: 10px;
        }
        .cart-toggle-btn:hover { background: #2c2724; transform: translateY(-2px); box-shadow: 0 8px 16px rgba(44, 39, 36, 0.15); }
        #global-cart-badge { background: #d68c63; color: white; padding: 2px 8px; border-radius: 12px; font-size: 13px; font-weight: 700; }

        /* Hero Section */
        .hero-banner { 
            text-align: center; padding: 120px 20px 90px; 
            background: linear-gradient(180deg, #F0EBE1 0%, #F9F8F6 100%);
        }
        .hero-banner h1 { 
            font-family: 'Playfair Display', serif;
            font-size: 64px; font-weight: 600; margin-bottom: 15px; color: #2c2724; 
        }
        .hero-banner p { font-size: 19px; color: #6b635c; margin-bottom: 45px; font-weight: 300; }
        
        .hero-search-wrapper { display: flex; justify-content: center; padding: 0 20px; }
        .search-bar { 
            padding: 18px 28px; border: 1px solid #e0d8d0; border-radius: 40px; 
            width: 100%; max-width: 550px; font-size: 16px; outline: none;
            transition: all 0.3s ease; background: #fff; box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            color: #3b3530;
        }
        .search-bar::placeholder { color: #a59d95; }
        .search-bar:focus { border-color: #d68c63; box-shadow: 0 4px 25px rgba(214, 140, 99, 0.15); }

        /* Catalog Grid */
        .main-catalog { padding: 60px 40px; max-width: 1400px; margin: 0 auto; }
        .catalog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 45px; }
        
        /* Product Cards */
        .product-card { 
            background: #fff; border-radius: 0px; overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.02); transition: all 0.5s ease;
            border: 1px solid #f0ebe1; display: flex; flex-direction: column;
        }
        .product-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(59, 53, 48, 0.08); }
        
        .product-image-container { 
            aspect-ratio: 1 / 1.1; overflow: hidden; position: relative; background: #f0ebe1;
        }
        
        .product-image { 
            width: 100%; height: 100%; object-fit: cover; 
            transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        
        .product-card:hover .product-image { transform: scale(1.05); }
        
        .product-meta { padding: 25px; background: #fff; flex-grow: 1; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .product-meta h3 { font-size: 17px; font-weight: 500; margin-bottom: 8px; color: #2c2724; letter-spacing: 0.5px; }
        .item-price { font-weight: 400; color: #8a8178; font-size: 15px; margin-bottom: 25px; display: block; }
        
        .add-to-cart-btn { 
            background: #F9F8F6; color: #4a423b; border: 1px solid #e0d8d0; 
            padding: 14px; width: 100%; cursor: pointer; 
            font-weight: 500; font-size: 14px; transition: all 0.3s ease;
            margin-top: auto; letter-spacing: 1px; text-transform: uppercase;
        }
        .add-to-cart-btn:hover { background: #4a423b; color: #fff; border-color: #4a423b; }
        
        /* Cart Drawer */
        .cart-drawer-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(44, 39, 36, 0.4); backdrop-filter: blur(5px); 
            z-index: 150; opacity: 0; pointer-events: none; transition: opacity 0.4s ease; 
        }
        .cart-drawer-overlay.visible { opacity: 1; pointer-events: auto; }
        
        .cart-sidebar-drawer { 
            position: fixed; top: 0; right: -500px; width: 100%; max-width: 480px; height: 100%; 
            background: #F9F8F6; z-index: 200; padding: 40px; 
            transition: right 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94); 
            display: flex; flex-direction: column; box-shadow: -15px 0 40px rgba(0,0,0,0.1); 
        }
        .cart-sidebar-drawer.opened { right: 0; }
        
        .cart-drawer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 35px; }
        .cart-drawer-header h2 { font-family: 'Playfair Display', serif; font-size: 28px; color: #2c2724; }
        .close-drawer-btn { border:1px solid #e0d8d0; background: transparent; width: 45px; height: 45px; border-radius: 50%; cursor:pointer; font-size: 22px; color: #4a423b; transition: 0.3s; }
        .close-drawer-btn:hover { background: #e0d8d0; }
        
        .cart-scroll-items { flex-grow: 1; overflow-y: auto; padding-right: 15px; }
        .drawer-cart-item { display: flex; justify-content: space-between; align-items: center; padding: 25px 0; border-bottom: 1px solid #e0d8d0; }
        .drawer-cart-item:last-child { border-bottom: none; }
        .item-info strong { font-size: 16px; font-weight: 500; display: block; margin-bottom: 6px; color: #2c2724; }
        .item-info small { color: #8a8178; font-size: 14px; }
        
        .item-delete-btn { color: #a59d95; background: none; border: none; cursor: pointer; font-size: 12px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; transition: 0.3s; text-decoration: underline; }
        .item-delete-btn:hover { color: #d65a5a; }
        
        .cart-drawer-footer { padding-top: 25px; border-top: 2px solid #e0d8d0; margin-top: auto; }
        .subtotal-row { display:flex; justify-content: space-between; font-weight: 500; font-size: 20px; margin-bottom: 25px; color: #2c2724; }
        
        .checkout-action-btn { 
            background: #d68c63; color: white; border: none; width: 100%; 
            padding: 20px; cursor: pointer; font-size: 15px; letter-spacing: 1.5px;
            font-weight: 600; text-transform: uppercase; transition: 0.3s; 
        }
        .checkout-action-btn:hover { background: #c2764b; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(214, 140, 99, 0.3); }

        /* Responsive */
        @media (max-width: 768px) {
            .brand-logo { font-size: 30px; }
            .hero-banner h1 { font-size: 42px; }
            .catalog-grid { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; }
            header { padding: 15px 25px; }
            .main-catalog { padding: 40px 25px; }
            .cart-sidebar-drawer { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <!-- Cart Overlay & Drawer -->
    <div class="cart-drawer-overlay" id="cartOverlay" onclick="toggleCartDrawer()"></div>
    
    <div class="cart-sidebar-drawer" id="cartSidebar">
        <div class="cart-drawer-header">
            <h2>Your Cart</h2>
            <button class="close-drawer-btn" onclick="toggleCartDrawer()">&times;</button>
        </div>
        <div class="cart-scroll-items" id="cartItemsContainer"></div>
        <div class="cart-drawer-footer">
            <div class="subtotal-row">
                <span>Subtotal</span> <span id="cartTotalSum">₹0.00</span>
            </div>
            <button class="checkout-action-btn" onclick="triggerCheckoutAlert()">Secure Checkout</button>
        </div>
    </div>

    <!-- Header -->
    <header>
        <div class="brand-logo">LUMA.</div>
        <div class="header-actions">
            <button class="cart-toggle-btn" onclick="toggleCartDrawer()">
                Cart <span id="global-cart-badge">0</span>
            </button>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero-banner">
        <h1>Curated Living</h1>
        <p>Mindful objects and timeless decor for your sanctuary.</p>
        <div class="hero-search-wrapper">
            <input type="text" id="searchInput" class="search-bar" placeholder="Search ceramics, lighting, decor..." onkeyup="filterProducts()">
        </div>
    </section>

    <!-- Catalog -->
    <main class="main-catalog" id="catalog">
        <div class="catalog-grid" id="catalogGrid">
            <!-- Product Data Script mapped to Home Decor -->
            <script>
                const products = [
                    { name: "Handcrafted Ceramic Vase", price: 2499, image: "https://images.unsplash.com/photo-1612196808214-b8e1d6145a8c?auto=format&fit=crop&w=600&q=80" },
                    { name: "Linen Throw Blanket", price: 3199, image: "https://www.tslco.com.au/cdn/shop/files/linen-throw-blanket-in-natural-oatmeal-898952.jpg?v=1735473162" },
                    { name: "Minimalist Table Lamp", price: 4599, image: "https://images.unsplash.com/photo-1507473885765-e6ed057f782c?auto=format&fit=crop&w=600&q=80" },
                    { name: "Ribbed Glass Tumbler Set", price: 1299, image: "https://nestasia.in/cdn/shop/files/Tumblers_2.jpg?v=1695207146" },
                    { name: "Terrazzo Serving Tray", price: 1899, image: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRXUQuy90Dig5LlbmYpknEg5flgDY0t0uHZwEzQjtO63tFqWIE4B-KnZAlB&s=10" },
                    { name: "Matte Black Teapot", price: 2199, image: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTofjYQ7dO08pZ2OhdfF2rYTDBgHmk62GB2r9RvR70zgA&s" },
                    { name: "Woven Rattan Basket", price: 1599, image: "https://www.aurumhomesolutions.in/cdn/shop/files/Gemini_Generated_Image_9zpy109zpy109zpy_copy_2.jpg?v=1769438621" },
                    { name: "Scented Soy Candle", price: 899, image: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS4Ugv4JtyDlBS_XMhmLIc3FPNrQPKDatSbZjYE3rjcNMW1YQHZT6ZC0g&s=10" },
                    { name: "Oak Wood Coasters", price: 699, image: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSZdcNma8yc6Z9F65A7kijKgyJl104qMEx2eNW5tS0e4cmDbz5Ihyw0DQBh&s=10" },
                    { name: "Sculptural Bookends", price: 2999, image: "https://images.unsplash.com/photo-1544457070-4cd773b4d71e?auto=format&fit=crop&w=600&q=80" },
                    { name: "Lounge Accent Chair", price: 12499, image: "https://images.unsplash.com/photo-1567538096630-e0c55bd6374c?auto=format&fit=crop&w=600&q=80" },
                    { name: "Abstract Wall Art", price: 3899, image: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTn9lgvvC0me5DUGQKe_jV_KR0jCscjHk7t0eT5ZWkEFwKzwFfcrXRouCAb&s=10" }
                ];

                const grid = document.getElementById('catalogGrid');
                products.forEach(p => {
                    grid.innerHTML += `
                        <div class="product-card">
                            <div class="product-image-container">
                                <img src="${p.image}" alt="${p.name}" class="product-image" loading="lazy">
                            </div>
                            <div class="product-meta">
                                <h3>${p.name}</h3>
                                <span class="item-price">₹${p.price.toLocaleString('en-IN')}</span>
                                <button class="add-to-cart-btn" onclick="addItemToCartState('${p.name}', ${p.price})">Add to Cart</button>
                            </div>
                        </div>
                    `;
                });
            </script>
        </div>
    </main>

    <!-- Application Logic -->
    <script>
        let globalShoppingCartState = [];

        function filterProducts() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.product-card').forEach(card => {
                const name = card.querySelector('h3').textContent.toLowerCase();
                card.style.display = name.includes(query) ? "flex" : "none";
            });
        }

        function toggleCartDrawer() {
            document.getElementById('cartSidebar').classList.toggle('opened');
            document.getElementById('cartOverlay').classList.toggle('visible');
        }

        function addItemToCartState(name, price) {
            const existing = globalShoppingCartState.find(item => item.name === name);
            if (existing) { existing.quantity += 1; }
            else { globalShoppingCartState.push({ name, price, quantity: 1 }); }
            rebuildCartUiDisplay();
            
            // Automatically slide cart open
            if(!document.getElementById('cartSidebar').classList.contains('opened')) {
                toggleCartDrawer();
            }
        }

        function removeProductGroupFromCart(name) {
            globalShoppingCartState = globalShoppingCartState.filter(i => i.name !== name);
            rebuildCartUiDisplay();
        }

        function rebuildCartUiDisplay() {
            const container = document.getElementById('cartItemsContainer');
            container.innerHTML = globalShoppingCartState.length === 0 
                ? '<p style="text-align:center; margin-top:80px; color:#a59d95; font-size: 16px;">Your cart is beautifully empty.</p>' 
                : '';
            
            let total = 0, count = 0;
            globalShoppingCartState.forEach(item => {
                total += (item.price * item.quantity);
                count += item.quantity;
                container.innerHTML += `
                <div class="drawer-cart-item">
                    <div class="item-info">
                        <strong>${item.name}</strong>
                        <small>₹${item.price.toLocaleString('en-IN')} x ${item.quantity}</small>
                    </div>
                    <button class="item-delete-btn" onclick="removeProductGroupFromCart('${item.name}')">Remove</button>
                </div>`;
            });
            
            document.getElementById('global-cart-badge').textContent = count;
            document.getElementById('cartTotalSum').textContent = '₹' + total.toLocaleString('en-IN') + '.00';
        }

        function triggerCheckoutAlert() {
            if(globalShoppingCartState.length === 0) {
                alert("Please add some items to your cart before checking out.");
            } else {
                alert("Redirecting to secure LUMA checkout...");
            }
        }
    </script>
</body>
</html>
